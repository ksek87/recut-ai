name: Security

on:
  push:
    branches:
      - dev
      - main
      - "feature/**"
      - "fix/**"
  pull_request:
    branches:
      - dev
      - main
  schedule:
    # Weekly on Monday at 08:00 UTC — catches newly disclosed CVEs without a code push
    - cron: "0 8 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-audit:
    name: Dependency CVE audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install pip-audit and project dependencies
        run: |
          pip install pip-audit
          pip install -e ".[dev]"

      - name: Run pip-audit
        # Report CVEs but do not block CI on transitive/system-level findings.
        # Re-enable --strict once direct dependencies are fully pinned.
        run: pip-audit || true

  sast:
    name: SAST scan (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bandit
        run: pip install "bandit[toml]>=1.7"

      - name: Run bandit
        # -r recut: scan source package only, not tests
        # -ll -ii: MEDIUM+ severity and MEDIUM+ confidence (skips low-noise findings)
        run: bandit -r recut -ll -ii -f json -o bandit-report.json

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 14
