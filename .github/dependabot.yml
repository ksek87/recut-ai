version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    target-branch: "dev"
    labels:
      - "dependencies"
      - "python"
    open-pull-requests-limit: 5
    groups:
      dev-tools:
        patterns:
          - "pytest*"
          - "ruff"
          - "mypy"
          - "pylint"
          - "bandit"
          - "pip-audit"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    target-branch: "dev"
    labels:
      - "dependencies"
      - "github-actions"
